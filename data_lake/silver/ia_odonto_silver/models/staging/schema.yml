version: 2

models:
  - name: stg_recebimentos
    description: >
      Staging model for billing data from EspoCRM MariaDB.
      Anonymizes patient identifiers with SHA-256 + salt (LGPD compliant).
      Filters invalid records (valor = 0, null contato_id).
    columns:
      - name: contato_hash
        description: SHA-256 hash of contato_id with salt — LGPD compliant
        tests:
          - not_null
      - name: valor
        description: Payment amount in BRL — always greater than zero
        tests:
          - not_null
      - name: moeda
        description: Currency code — always brl
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['brl']
      - name: data_recebimento
        description: Payment date
        tests:
          - not_null
      - name: status
        description: Payment status — normalized to lowercase
        tests:
       _null
          - accepted_values:
              arguments:
                values: ['pago', 'pendente', 'cancelado', 'estornado']

  - name: stg_contacts
    description: >
      Staging model for contact analytical fields from EspoCRM MariaDB.
      No PII — only behavioral and financial metrics.
      Anonymizes contact id with SHA-256 + salt (LGPD compliant).
    columns:
      - name: contato_hash
        description: SHA-256 hash of contact id with salt — LGPD compliant
        tests:
          - not_null
          - unique
      - name: status_atendimento
        description: Care status normalized to lowercase
        tests:
          - not_null
      - name: lifetime_value
        description: Numeric LTV in BRL — decimal(13,2)
        tests:
          - not_null
      - name: potencial_venda
        description: Numeric sales potential in BRL — decimal(13,2)
        tests:
          - not_null
      - name: qtd_consultas
        description: Total visit count — integer >= 0
        tests  - not_null

  - name: stg_ai_summaries
    description: >
      Staging model isolating AI-generated clinical summaries from stg_contacts.
      Adds quality signals (missing, empty, too_short, ok).
      Source: stg_contacts via ref() — never Bronze directly.
    columns:
      - name: contato_hash
        description: SHA-256 anonymized contact identifier
        tests:
          - not_null
          - unique
      - name: summary_quality
        description: Quality classification of AI summary
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['ok', 'too_short', 'empty', 'missing']
      - name: summary_length
        description: Character length of AI summary
        tests:
          - not_null
