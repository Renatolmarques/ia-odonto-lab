services:
  api:
    build: .
    container_name: ia-odonto-api
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - default
      - stack-ia_default

  db:
    image: pgvector/pgvector:pg16
    container_name: ia-odonto-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ia_odonto
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:

networks:
  default:
    driver: bridge
  stack-ia_default:
    external: true